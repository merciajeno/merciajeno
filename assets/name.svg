<svg width="600" height="80" viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes typing {
      0%  { width: 0 }
      100%{ width: 320px }
    }
    @keyframes blink {
      0%, 100% { opacity: 1 }
      50%       { opacity: 0 }
    }
    @keyframes fadein {
      from { opacity: 0 }
      to   { opacity: 1 }
    }
    .bg { fill: #0d0d0f; }
    .magnify {
      font: 36px Georgia, serif;
      fill: #c9b99a;
      animation: fadein 0.5s ease both;
    }
    .name-clip rect {
      animation: typing 2s steps(11) 0.6s both;
    }
    .name-text {
      font: 700 32px Georgia, serif;
      fill: #e8d5b0;
      letter-spacing: 2px;
    }
    .cursor {
      fill: #c9b99a;
      animation: blink 0.75s step-end 0.6s infinite;
    }
  </style>

  <rect class="bg" width="600" height="80"/>

  <text class="magnify" x="20" y="54">🔍</text>

  <clipPath id="nameClip">
    <rect class="name-clip-rect" x="70" y="0" width="0" height="80">
      <animate attributeName="width" from="0" to="340" dur="2s" begin="0.6s" fill="freeze" calcMode="discrete" keyTimes="0;0.09;0.18;0.27;0.36;0.45;0.54;0.63;0.72;0.81;0.90;1" values="0;30;60;90;120;150;185;215;250;280;310;340"/>
    </rect>
  </clipPath>

  <text class="name-text" x="72" y="52" clip-path="url(#nameClip)">MERCIA JENO</text>

  <rect class="cursor" x="72" y="20" width="3" height="36">
    <animate attributeName="x" from="72" to="415" dur="2s" begin="0.6s" fill="freeze" calcMode="discrete" keyTimes="0;0.09;0.18;0.27;0.36;0.45;0.54;0.63;0.72;0.81;0.90;1" values="72;102;132;162;192;222;257;287;322;352;382;415"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.75s" begin="2.6s" repeatCount="indefinite"/>
  </rect>
</svg>