  <ellipse cx="200" cy="358" rx="180" ry="18" fill="#1e1a0a" opacity="0.4"/>
  <ellipse cx="620" cy="360" rx="160" ry="16" fill="#1e1a0a" opacity="0.35"/>

  <!-- corner brackets -->
  <line x1="20" y1="16" x2="80" y2="16" stroke="#3a3020" stroke-width="0.6"/>
  <line x1="20" y1="16" x2="20" y2="56" stroke="#3a3020" stroke-width="0.6"/>
  <line x1="720" y1="16" x2="780" y2="16" stroke="#3a3020" stroke-width="0.6"/>
