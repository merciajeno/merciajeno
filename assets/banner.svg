    .r8  { animation: rain8  3.1s linear 1.1s infinite; }
    .r9  { animation: rain9  2.8s linear 0.5s infinite; }
    .r10 { animation: rain10 3.5s linear 0.0s infinite; }
    .r11 { animation: rain11 2.6s linear 0.8s infinite; }
    .r12 { animation: rain12 3.2s linear 0.15s infinite; }
    .r13 { animation: rain13 2.9s linear 1.3s infinite; }
    .r14 { animation: rain14 3.0s linear 0.35s infinite; }
    .r15 { animation: rain15 2.7s linear 0.95s infinite; }
    .r16 { animation: rain16 3.4s linear 0.55s infinite; }
    .r17 { animation: rain17 2.8s linear 1.2s infinite; }
    .r18 { animation: rain18 3.1s linear 0.25s infinite; }
    .r19 { animation: rain19 2.6s linear 0.75s infinite; }
    .r20 { animation: rain20 3.3s linear 0.45s infinite; }
    .r21 { animation: rain21 2.9s linear 1.05s infinite; }
    .r22 { animation: rain22 2.7s linear 0.15s infinite; }
    .r23 { animation: rain23 3.0s linear 0.85s infinite; }
    .r24 { animation: rain24 3.2s linear 0.60s infinite; }
