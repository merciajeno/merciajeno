    .cursor { animation: blink 1s step-end infinite; }
    .scan   { animation: scanpulse 2.5s ease-in-out infinite; }
    .tw     { animation: typewrite 1.8s steps(12,end) 0.3s both; }
    .fi1 { animation: fadein 0.6s 2.1s both; }
    .fi2 { animation: fadein 0.6s 3.7s both; }
    .fi3 { animation: fadein 0.6s 4.8s both; }
    .fi4 { animation: fadein 0.6s 5.2s both; }
    .fi5 { animation: fadein 0.6s 5.5s both; }
    .r0  { animation: rain0  3.1s linear 0.0s infinite; }
    .r1  { animation: rain1  2.8s linear 0.4s infinite; }
    .r2  { animation: rain2  3.4s linear 0.1s infinite; }
    .r3  { animation: rain3  2.6s linear 0.7s infinite; }
    .r4  { animation: rain4  3.0s linear 0.2s infinite; }
    .r5  { animation: rain5  2.9s linear 0.9s infinite; }
