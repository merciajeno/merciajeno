  <!-- shadow under silhouette -->
  <ellipse cx="374" cy="358" rx="60" ry="8" fill="#000" opacity="0.5"/>

  <!-- ══ NAME TYPEWRITER ══ -->
  <clipPath id="nc">
    <rect x="218" y="265" width="0" height="58">
      <animate attributeName="width" from="0" to="370" dur="2s" begin="0.8s" fill="freeze"
        calcMode="discrete"
        keyTimes="0;0.083;0.166;0.249;0.332;0.415;0.498;0.581;0.664;0.747;0.830;0.913;1"
        values="0;32;64;96;128;160;200;232;264;296;328;360;370"/>
    </rect>
  </clipPath>

  <!-- name clip — 11 chars, each ~30px wide at font-size 40 + letter-spacing 3 = ~33px/char, total ~363px, use 380 to be safe -->
  <clipPath id="nc2">
    <rect x="450" y="130" width="0" height="58">
      <animate attributeName="width" from="0" to="380" dur="2.2s" begin="0.8s" fill="freeze"
        calcMode="discrete"
        keyTimes="0;0.0909;0.1818;0.2727;0.3636;0.4545;0.5454;0.6363;0.7272;0.8181;0.9090;1"
        values="0;35;70;105;140;175;210;245;280;315;350;380"/>
    </rect>
  </clipPath>
  <text font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="bold"
    fill="#e8d5b0" letter-spacing="3" x="452" y="178"
    clip-path="url(#nc2)">MERCIA JENO</text>

  <!-- cursor — matches clip steps exactly -->
  <rect fill="#c9b99a" x="452" y="138" width="3" height="40">
    <animate attributeName="x" from="452" to="832" dur="2.2s" begin="0.8s" fill="freeze"
      calcMode="discrete"
      keyTimes="0;0.0909;0.1818;0.2727;0.3636;0.4545;0.5454;0.6363;0.7272;0.8181;0.9090;1"
      values="452;487;522;557;592;627;662;697;732;767;802;832"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="3.1s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text font-family="Georgia,serif" font-size="11" fill="#8a7a62"
    letter-spacing="4" x="452" y="205" opacity="0">
    BACKEND DETECTIVE
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="3s" fill="freeze"/>
  </text>
  <text font-family="Georgia,serif" font-size="11" fill="#8a7a62"
    letter-spacing="4" x="452" y="222" opacity="0">
    SOFTWARE INVESTIGATOR
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="3.2s" fill="freeze"/>
  </text>

  <!-- quote -->
  <text font-family="Georgia,serif" font-size="10" fill="#5a5040"
    font-style="italic" x="452" y="248" opacity="0">
    "When you eliminate the impossible,
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="3.6s" fill="freeze"/>
  </text>
  <text font-family="Georgia,serif" font-size="10" fill="#5a5040"
    font-style="italic" x="452" y="262" opacity="0">
    whatever remains must be the bug."
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="3.7s" fill="freeze"/>
  </text>

  <!-- divider -->
  <line x1="40" y1="372" x2="760" y2="372" stroke="#2a2416" stroke-width="0.8"
    stroke-dasharray="720" stroke-dashoffset="720">
    <animate attributeName="stroke-dashoffset" from="720" to="0" dur="1.4s" begin="4s" fill="freeze"/>
  </line>

  <!-- badges -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="4.4s" fill="freeze"/>
    <rect x="96" y="384" width="184" height="24" rx="3" fill="#0d2b0d" stroke="#1a5c1a" stroke-width="0.8"/>
    <circle cx="113" cy="396" r="3.5" fill="#2ea44f"/>
    <text font-family="Georgia,serif" font-size="10.5" fill="#4caf50" x="122" y="400" letter-spacing="0.5">Active Investigation</text>

    <rect x="296" y="384" width="172" height="24" rx="3" fill="#1f0a0a" stroke="#5c1a1a" stroke-width="0.8"/>
    <text font-family="Georgia,serif" font-size="10.5" fill="#a04040" x="308" y="400" letter-spacing="0.5">Spring Boot Systems</text>

    <rect x="484" y="384" width="150" height="24" rx="3" fill="#0d0d2b" stroke="#2a2a6b" stroke-width="0.8"/>
    <text font-family="Georgia,serif" font-size="10.5" fill="#6060c0" x="496" y="400" letter-spacing="0.5">Bengaluru, India</text>
  </g>

  <!-- bottom ornament -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="5s" fill="freeze"/>
    <polygon points="400,410 406,418 400,426 394,418" fill="none" stroke="#4a3e22" stroke-width="0.7"/>
    <line x1="370" y1="418" x2="390" y2="418" stroke="#4a3e22" stroke-width="0.5"/>
    <line x1="410" y1="418" x2="430" y2="418" stroke="#4a3e22" stroke-width="0.5"/>
    <circle cx="367" cy="418" r="1.5" fill="#4a3e22"/>
    <circle cx="433" cy="418" r="1.5" fill="#4a3e22"/>
  </g>

</svg>