<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scanpulse { 0%,100%{opacity:0.18} 50%{opacity:0.32} }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    @keyframes typewrite { 0%{clip-path:inset(0 100% 0 0)} 100%{clip-path:inset(0 0% 0 0)} }
    @keyframes rain0  { 0%{transform:translateY(-20px)} 100%{transform:translateY(360px)} }
    @keyframes rain1  { 0%{transform:translateY(-40px)} 100%{transform:translateY(360px)} }
    @keyframes rain2  { 0%{transform:translateY(-60px)} 100%{transform:translateY(360px)} }
