<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">

  <rect width="800" height="420" fill="#0d0d0f"/>

  <!-- fog layers -->
  <ellipse cx="400" cy="300" rx="420" ry="120" fill="#1a1508" opacity="0.35"/>
  <ellipse cx="150" cy="200" rx="260" ry="100" fill="#120f05" opacity="0.4"/>
  <ellipse cx="680" cy="220" rx="200" ry="90" fill="#120f05" opacity="0.3"/>

  <!-- ground fog wisps -->
