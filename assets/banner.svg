  <line x1="20" y1="404" x2="80" y2="404" stroke="#3a3020" stroke-width="0.6"/>
  <line x1="20" y1="364" x2="20" y2="404" stroke="#3a3020" stroke-width="0.6"/>
  <line x1="720" y1="404" x2="780" y2="404" stroke="#3a3020" stroke-width="0.6"/>
  <line x1="780" y1="364" x2="780" y2="404" stroke="#3a3020" stroke-width="0.6"/>

  <!-- ══ LAMP POST (left) ══ -->
  <rect x="118" y="120" width="6" height="240" fill="#1c1810"/>
  <rect x="116" y="118" width="10" height="6" rx="2" fill="#2a2416"/>
  <!-- arm -->
  <path d="M121,124 Q148,118 148,138" fill="none" stroke="#1c1810" stroke-width="4"/>
  <!-- lamp housing -->
  <ellipse cx="148" cy="140" rx="10" ry="7" fill="#2a2010"/>
  <ellipse cx="148" cy="138" rx="7" ry="4" fill="#c9952a" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.85;0.5;0.7;0.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- lamp glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c9952a" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#c9952a" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="148" cy="155" rx="55" ry="45" fill="url(#glow)">
    <animate attributeName="rx" values="55;62;55;58;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="45;52;45;48;45" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- post base -->
  <rect x="112" y="356" width="18" height="8" rx="2" fill="#1c1810"/>

  <!-- ══ DETECTIVE SILHOUETTE ══ -->
  <g fill="#0f0f0a">

    <!-- coat / body — long trench coat shape -->
    <path d="
      M370,148
      C368,150 365,155 364,162
      L354,165
      C350,166 348,169 349,173
      L352,182
      C348,183 344,186 342,190
      L330,240
      C326,255 324,270 326,285
      L322,350
      C321,355 324,358 328,358
      L346,358
      C350,358 352,355 352,351
      L350,310
      L356,310
      L360,351
      C360,355 363,358 367,358
      L380,358
      C384,358 386,354 385,350
      L378,285
      C380,270 379,255 375,240
      L366,195
      L374,192
      L382,195
      L373,240
      C369,255 368,270 370,285
      L363,350
      C362,354 364,358 368,358
      L381,358
      C385,358 388,355 387,351
      L391,310
      L397,310
      L395,351
      C394,355 397,358 401,358
      L419,358
      C423,358 426,355 425,350
      L421,285
      C423,270 421,255 417,240
      L405,190
      C403,186 399,183 395,182
      L398,173
      C399,169 397,166 393,165
      L383,162
      C382,155 379,150 377,148
      Z
    "/>

    <!-- head -->
    <ellipse cx="374" cy="128" rx="16" ry="18"/>

    <!-- neck -->
    <rect x="368" y="143" width="12" height="10" rx="2"/>

    <!-- ── DEERSTALKER HAT ── -->
    <!-- main hat dome -->
    <path d="M352,122 Q358,100 374,98 Q390,100 396,122 Z"/>
    <!-- hat brim front -->
    <path d="M350,122 Q356,126 374,127 Q392,126 398,122 Q392,118 374,118 Q356,118 350,122 Z"/>
    <!-- front peak -->
    <path d="M350,122 Q340,120 336,125 Q342,128 350,124 Z"/>
    <!-- back peak -->
    <path d="M398,122 Q408,120 412,125 Q406,128 398,124 Z"/>
    <!-- hat band line -->
    <path d="M354,118 Q374,116 394,118" fill="none" stroke="#1a1a14" stroke-width="1.5"/>

    <!-- coat lapels -->
    <path d="M364,162 L358,185 L370,178 L374,190 L378,178 L390,185 L384,162 Z" fill="#141410"/>

    <!-- pipe in hand -->
    <path d="M390,220 Q408,215 414,208 Q418,202 415,198 Q412,194 408,197 Q406,200 408,204 Q404,208 390,218 Z"
      fill="#2a2010"/>
    <!-- pipe bowl -->
    <ellipse cx="415" cy="198" rx="5" ry="7" fill="#2a2010"/>
    <!-- pipe smoke -->
    <path d="M415,191 Q418,184 414,178 Q410,172 414,166 Q418,160 414,154"
      fill="none" stroke="#3a3020" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M417,188 Q422,181 418,175 Q414,169 418,163"
      fill="none" stroke="#3a3020" stroke-width="1" stroke-linecap="round" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    </path>

    <!-- magnifying glass in other hand -->
    <circle cx="342" cy="218" r="18" fill="none" stroke="#0f0f0a" stroke-width="6"/>
    <circle cx="342" cy="218" r="18" fill="none" stroke="#2a2416" stroke-width="2"/>
    <line x1="354" y1="230" x2="366" y2="245" stroke="#0f0f0a" stroke-width="6" stroke-linecap="round"/>
    <line x1="354" y1="230" x2="366" y2="245" stroke="#2a2416" stroke-width="2.5" stroke-linecap="round"/>
    <!-- lens glint -->
    <path d="M334,210 Q338,207 343,209" fill="none" stroke="#3a3428" stroke-width="1.2" stroke-linecap="round"/>

    <!-- coat tail flap -->
    <path d="M326,285 L318,355 L335,355 L340,310 Z" fill="#0d0d08"/>
    <path d="M421,285 L429,355 L412,355 L407,310 Z" fill="#0d0d08"/>

    <!-- coat belt / button row -->
    <rect x="366" y="200" width="4" height="4" rx="1" fill="#1a1810"/>
    <rect x="366" y="210" width="4" height="4" rx="1" fill="#1a1810"/>
    <rect x="366" y="220" width="4" height="4" rx="1" fill="#1a1810"/>

